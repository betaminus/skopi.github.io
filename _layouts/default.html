<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="icon" type="image/png" href="{{ '/assets/skopi-mark.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand-link" href="{{ '/' | relative_url }}">
      <img class="logo" src="{{ '/assets/skopi-mark.png' | relative_url }}" alt="skopi logo">
      <span class="brand">{{ site.title }}</span>
    </a>
  </header>

  {{ content }}

  <footer class="site-footer">
    <p>&copy; 2026 Skopi. All rights reserved. ·
      <a href="{{ '/privacy/' | relative_url }}">Privacy Policy</a> ·
      <a href="{{ '/terms/' | relative_url }}">Terms &amp; Conditions</a></p>
  </footer>
</body>
</html>
