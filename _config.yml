# Site URL / paths
# Served at the apex custom domain root (see CNAME), so baseurl must be empty.
# This repo is a project site (owner != repo name), and GitHub Pages otherwise
# auto-injects baseurl: /skopi.github.io, which breaks asset/link paths at the
# domain root. Setting it explicitly here overrides that.
url: "https://skopi.ai"
baseurl: ""

# Brand / display
title: skopi.ai
description: "skopi — monitoring service. Launching soon."

# Landing page copy (config-driven subtext under the headline)
tagline: "Monitoring, reimagined. Something new is on the way."

# Optional notify link: a mailto: address or URL.
# Leave empty ("") to hide the button.
notify_link: ""

# Build settings
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - docs/
